<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orokpo Israel — Responsive Logo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060A12;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      padding: 30px;
      color: white;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 50px;
      transition: all 0.5s ease;
      width: 100%;
      max-width: 1000px;
    }

    /* --- THE MONOGRAM MARK --- */
    .monogram-container {
      position: relative;
      width: clamp(180px, 40vw, 300px);
      height: clamp(180px, 40vw, 300px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .ring {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0, 180, 216, 0.2);
      border-radius: 50%;
    }

    .oi-text {
      font-size: clamp(5rem, 12vw, 9rem);
      line-height: 1;
    }

    .oi-o { font-weight: 300; color: white; }
    .oi-i { font-weight: 600; font-style: italic; color: #00B4D8; margin-left: -0.05em; }

    /* --- THE IDENTITY TEXT --- */
    .identity-text {
      text-align: left;
    }

    .name {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .title {
      font-size: clamp(0.7rem, 2vw, 1rem);
      color: #00B4D8;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      font-style: italic;
      margin-top: 15px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #00B4D8;
      margin-top: 20px;
      opacity: 0.5;
    }

    /* --- RESPONSIVE FIX (PORTRAIT MODE) --- */
    @media (max-width: 800px) {
      .logo-wrapper {
        flex-direction: column; /* Stacks logo and name */
        text-align: center;
        gap: 30px;
      }
      
      .identity-text {
        text-align: center;
      }

      .divider {
        margin: 20px auto; /* Centers divider */
      }
    }
  </style>
</head>
<body>

  <div class="logo-wrapper">
    <!-- Monogram Part -->
    <div class="monogram-container">
      <div class="ring"></div>
      <div class="oi-text">
        <span class="oi-o">O</span><span class="oi-i">I</span>
      </div>
    </div>

    <!-- Name and Title Part -->
    <div class="identity-text">
      <h1 class="name">Orokpo Israel</h1>
      <p class="title">Web Developer & UI Designer</p>
      <div class="divider"></div>
    </div>
  </div>

</body>
</html>
