<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (Midnight) -->
  <rect width="500" height="500" fill="#060A12"/>

  <!-- Logo Mark (Circles and Letters) -->
  <g transform="translate(150, 70)">
    <circle cx="100" cy="100" r="98" stroke="#00B4D8" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="100" cy="100" r="86" stroke="#00B4D8" stroke-opacity="0.10" stroke-width="1"/>
    
    <!-- "O" -->
    <text x="65" y="135" fill="white" font-family="Georgia, serif" font-size="110" font-weight="300">O</text>
    
    <!-- "I" -->
    <text x="108" y="135" fill="#00B4D8" font-family="Georgia, serif" font-size="110" font-weight="600" font-style="italic">I</text>
    
    <!-- Dot -->
    <circle cx="100" cy="175" r="3" fill="#00B4D8"/>
  </g>

  <!-- Text Section -->
  <g transform="translate(250, 340)">
    <text x="0" y="40" fill="white" font-family="Georgia, serif" font-size="32" font-weight="300" text-anchor="middle" letter-spacing="0.25em">OROKPO ISRAEL</text>
    
    <line x1="-30" y1="75" x2="30" y2="75" stroke="#00B4D8" stroke-width="1.5" stroke-opacity="0.5"/>
    
    <text x="0" y="110" fill="#00B4D8" font-family="Georgia, serif" font-size="14" font-weight="400" font-style="italic" text-anchor="middle" letter-spacing="0.35em">WEB DEVELOPER &amp; UI DESIGNER</text>
  </g>
</svg>