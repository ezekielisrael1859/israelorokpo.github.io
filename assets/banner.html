<!-- Version 2.0 - Responsive -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orokpo Israel — Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0f19;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      padding: 10px;
    }
    .banner {
      width: 100%;
      max-width: 1200px;
      min-height: 380px;
      background: #060A12;
      border: 1px solid rgba(0, 180, 216, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 40px;
      position: relative;
      overflow: hidden;
      flex-wrap: wrap; /* Allows wrapping on small screens */
    }
    .banner-content { position: relative; z-index: 2; text-align: left; flex: 1; min-width: 300px; }
    .banner-name { font-size: 3.5rem; color: white; letter-spacing: 0.15em; text-transform: uppercase; }
    .banner-title { color: #00B4D8; letter-spacing: 0.3em; text-transform: uppercase; font-style: italic; }
    .banner-logo { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; width: 250px; height: 250px; }
    .oi-text { font-size: 7rem; color: white; }
    .oi-text span { color: #00B4D8; font-style: italic; font-weight: 600; }
    
    /* MOBILE FIX */
    @media (max-width: 700px) {
      .banner { flex-direction: column; text-align: center; padding: 30px; height: auto; }
      .banner-content { text-align: center; order: 2; min-width: 100%; }
      .banner-name { font-size: 2.2rem; }
      .banner-logo { order: 1; width: 180px; height: 180px; }
      .oi-text { font-size: 5rem; }
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="banner-content">
      <h1 class="banner-name">Orokpo Israel</h1>
      <p class="banner-title">Web Developer & UI Designer</p>
    </div>
    <div class="banner-logo">
      <div class="oi-text">O<span>I</span></div>
    </div>
  </div>
</body>
</html>
