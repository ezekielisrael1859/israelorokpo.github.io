<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orokpo Israel — Social Media Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b0f19;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    /* THE BANNER (Standard 3:1 Ratio) */
    .banner {
      width: 1500px;
      height: 500px;
      background: #060A12;
      border: 1px solid rgba(0, 180, 216, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 120px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 50px 100px rgba(0,0,0,0.8);
    }

    /* Background Design Glows */
    .banner::before {
      content: '';
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(0, 180, 216, 0.04) 0%, transparent 70%);
      top: -200px;
      right: -100px;
    }

    /* LEFT SIDE CONTENT */
    .banner-info {
      position: relative;
      z-index: 2;
    }

    .banner-name {
      font-size: 5.5rem;
      font-weight: 300;
      color: #FFFFFF;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    .banner-title {
      font-size: 1.6rem;
      font-weight: 400;
      color: #00B4D8;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      font-style: italic;
    }

    /* RIGHT SIDE MONOGRAM */
    .banner-monogram {
      position: relative;
      width: 350px;
      height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .ring-outer {
      position: absolute;
      inset: 0;
      border: 1px solid rgba(0, 180, 216, 0.25);
      border-radius: 50%;
    }

    .ring-inner {
      position: absolute;
      inset: 25px;
      border: 1px solid rgba(0, 180, 216, 0.10);
      border-radius: 50%;
    }

    .oi-text {
      font-size: 11rem;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .oi-o { color: #FFFFFF; font-weight: 300; }
    .oi-i { 
        color: #00B4D8; 
        font-weight: 600; 
        font-style: italic; 
        margin-left: -0.1em;
        text-shadow: 0 0 30px rgba(0, 180, 216, 0.3);
    }

    .signature-dot {
      position: absolute;
      bottom: 45px;
      width: 8px;
      height: 8px;
      background: #00B4D8;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(0, 180, 216, 0.7);
    }
  </style>
</head>
<body>

  <div class="banner">
    <!-- Left Section -->
    <div class="banner-info">
      <h1 class="banner-name">Orokpo Israel</h1>
      <p class="banner-title">Web Developer & UI Designer</p>
    </div>

    <!-- Right Section -->
    <div class="banner-monogram">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="oi-text">
        <span class="oi-o">O</span><span class="oi-i">I</span>
      </div>
      <div class="signature-dot"></div>
    </div>
  </div>

</body>
</html>
